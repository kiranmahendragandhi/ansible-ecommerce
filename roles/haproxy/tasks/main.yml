---
- name: Install HAProxy load balancer software package
  apt:
    name: haproxy
    state: present

- name: Deploy dynamic HAProxy load distribution template config
  template:
    src: haproxy.cfg.j2
    dest: /etc/haproxy/haproxy.cfg
  notify: Restart HAProxy Service

- name: Ensure HAProxy service engine is started and running
  service:
    name: haproxy
    state: started
    enabled: true
